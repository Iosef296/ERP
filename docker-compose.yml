services:
  postgres:
    image: postgres:16-alpine
    container_name: ruashka_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ruashka
      POSTGRES_PASSWORD: ruashka123
      POSTGRES_DB: ruashka_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ruashka_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ruashka.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
